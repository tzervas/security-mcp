name: CI

# Manual only — run the same checks locally via ./scripts/check.sh
on:
  push:
    branches:
      - main
      - dev
      - develop
  pull_request:
    branches:
      - main
      - dev
      - develop
  workflow_dispatch:

permissions:
  contents: read
  checks: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_BUILD_JOBS: "2"
  # Fleet runners are cgroup-capped at 8 GiB with MemorySwap == Memory — i.e. ZERO swap
  # headroom, so a build that peaks over the cap is SIGKILLed outright rather than
  # degrading. This job died exactly that way: `rustc --crate-name syn ... (signal: 9,
  # SIGKILL)`. Debug info is one of rustc's largest memory consumers and is worthless to
  # a CI run that only reports pass/fail, so drop it. `CARGO_BUILD_JOBS: 2` above already
  # bounds concurrency; this bounds per-process peak, which is the binding constraint.
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"

jobs:
  build-and-test:
    name: Build and Test (local parity)
    runs-on: [self-hosted, linux, x64, podman]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          set -euo pipefail
          # Self-hosted work containers use no-new-privileges — sudo cannot escalate.
          if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            sudo apt-get update -qq || true
            sudo apt-get install -y libssl-dev pkg-config || true
          else
            echo "no passwordless sudo (expected on hardened self-hosted image) — using image packages"
            command -v pkg-config >/dev/null 2>&1 || echo "warn: pkg-config missing"
          fi

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: security-mcp

      - name: Local-parity checks
        working-directory: .
        run: bash scripts/check.sh
