# Trivy secret-scanning config for security-mcp.
#
# Auto-loaded: `--secret-config` defaults to `trivy-secret.yaml` in the scan root, and
# fleet-security.yml runs `trivy fs ... .` from the repo root — so no workflow change is needed.
#
# WHY THIS EXISTS
# This crate's whole purpose is detecting secrets, so its unit tests must contain strings shaped like
# real credentials in order to assert the detector regexes fire. Trivy flagged two of them as
# CRITICAL findings:
#
#   src/patterns.rs:236  GITHUB_TOKEN.is_match("ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx")
#   src/patterns.rs:237  GITHUB_TOKEN.is_match("gho_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx")
#
# Those are all-`x` placeholders, not credentials. gitleaks was already allowlisted for exactly
# this (see CHANGELOG 0.2.0-alpha, "gitleaks allowlist scoped to intentional detector-fixture
# secret shapes"); trivy was not, so `fleet-security` reported CRITICALs on every run. That is the
# worst kind of finding: permanent, known-false, and therefore training everyone to ignore the
# scanner exactly where it matters most.
#
# SCOPING — deliberately by *shape*, not by path.
# The allow-rule matches only tokens whose body is a run of placeholder characters. A REAL
# credential committed to `src/patterns.rs` would still be reported, because a real token's body
# is high-entropy and cannot match `x{20,}`. A path-based exemption would have blinded the scanner
# to the one file most likely to accumulate copy-pasted real tokens.
#
# Adding a fixture for a new provider? Use the same all-placeholder body and it is covered; use a
# realistic-looking random body and trivy will (correctly) flag it.

allow-rules:
  - id: detector-fixture-placeholder-token
    description: >-
      Unit-test fixtures for this crate's own detectors: provider-prefixed tokens whose body is a
      run of placeholder characters (e.g. ghp_xxxx…). Shape-scoped, so genuine high-entropy
      credentials are still reported anywhere in the tree, including in the same file.
    regex: (?i)(gh[pousr]|xox[baprs]|sk|pk|AKIA)[-_][xX]{16,}
